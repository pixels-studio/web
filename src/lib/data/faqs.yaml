heading: "FAQs"
title: "Questions, answered."

faqs:
  - question: "What kind of work do you take on?"
    answer: "Product design, complex workflows, design systems, prototypes, and frontend implementation for AI and SaaS products."
  - question: "Do you work with startups or larger teams?"
    answer: "Both. I work best with teams building complex digital products that need strong design thinking and hands-on execution."
  - question: "Can you work with an existing product team?"
    answer: "Yes. I can join an existing product and engineering workflow, collaborate asynchronously, and work within established systems."
  - question: "Do you handle frontend implementation?"
    answer: "Yes. I can implement production interfaces using React, Svelte, HTML, CSS, and modern frontend tooling."
  - question: "Are you available for full-time roles?"
    answer: "Yes. I'm open to remote international roles and relocation, alongside selected freelance engagements."
  - question: "How do projects usually start?"
    answer: "With a short call to understand the product, scope, team, and expected outcome."
