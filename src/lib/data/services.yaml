heading: "Services"
title: "A sprint to ship one thing well, or a retainer for everything after."
description: "Every pixel pushed, every line of code shipped is held to the same standard: it has to be the best it can be. Pick the engagement that fits — a focused sprint to ship one thing well, or a partnership for teams who need design as an always-on function."

plans:
  - id: "sprint"
    eyebrow: "2-week design sprint"
    summary: "One focused build. A landing page, dashboard, brand starter, or up to 8 mobile screens."
    price: "$2,500"
    priceSuffix: "One-time price"
    features:
      - icon: "browser"
        label: "Landing page"
      - icon: "tablet"
        label: "Dashboard"
      - icon: "phone"
        label: "Mobile app"
      - icon: "chart"
        label: "Pitch deck"
    cta:
      label: "Let's Talk"
      href: "mailto:abhi@pixels.studio"

  - id: "retainer"
    eyebrow: "Ongoing partnership"
    summary: "A dedicated design team. Unlimited output. Design, strategy, and no-code delivery — on retainer."
    price: "$5,000"
    priceSuffix: "/month"
    features:
      - icon: "founder"
        label: "Work directly with the founder, no handoffs"
      - icon: "infinity"
        label: "Unlimited design requests & revisions"
      - icon: "clock"
        label: "48-hour turnarounds, weekdays"
      - icon: "monitor"
        label: "Weekly strategy calls + Slack integration"
    cta:
      label: "Let's Talk"
      href: "mailto:abhi@pixels.studio"

faqs:
  - question: "How fast can we start?"
    answer: "Most engagements kick off within a week. Sprints get a fixed start date; retainers begin the Monday after onboarding."
  - question: "What does a typical retainer week look like?"
    answer: "Async by default — requests come in via a shared board, designs ship in 48 hours, and we hold one strategy call a week. Slack is open for anything in between."
  - question: "Who owns the work?"
    answer: "You do. Source files, code, and rights transfer on delivery. No lock-in to proprietary tooling."
  - question: "Can a sprint roll into a retainer?"
    answer: "Yes. The sprint price credits toward your first month if you continue within 30 days."
  - question: "What if a sprint needs more than two weeks?"
    answer: "We scope tightly up front so it usually doesn't. If scope grows, we'll quote a second sprint rather than stretch the first."
